name: health_one
description: 血压记录 APP - 帮助你轻松记录和管理血压数据
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 本地数据存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 本地通知
  flutter_local_notifications: ^16.3.0
  
  # 工具库
  path_provider: ^2.1.1
  intl: ^0.18.1
  
  # UI 组件
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
