name: Flutter CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  APP_NAME: health-mgmt
  FLUTTER_VERSION: '3.24.0'

jobs:
  # ========================================
  # Job 1: 代码检查和测试
  # ========================================
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: ${{ env.FLUTTER_HOME }}
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run analyzer
        run: flutter analyze
      
      - name: Run tests
        run: flutter test
      
      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        if: success()

  # ========================================
  # Job 2: 构建 Flutter Web
  # ========================================
  build-web:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      
      - name: Build Web
        run: |
          flutter pub get
          flutter build web --release --web-renderer html
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: web-build
          path: build/web
          retention-days: 7

  # ========================================
  # Job 3: Docker 镜像构建
  # ========================================
  docker-build:
    needs: build-web
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: web-build
          path: build/web
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build -t ${{ env.APP_NAME }}:${{ github.sha }} .
          docker tag ${{ env.APP_NAME }}:${{ github.sha }} ${{ env.APP_NAME }}:latest
      
      - name: Test Docker image
        run: |
          docker run --rm ${{ env.APP_NAME }}:latest \
            sh -c "nginx -t && echo 'Docker build successful!'"
      
      - name: Upload Docker image
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: |
            ${{ env.APP_NAME }}:${{ github.sha }}
            ${{ env.APP_NAME }}:latest
          retention-days: 1

  # ========================================
  # Job 4: 部署 (手动触发)
  # ========================================
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/health-mgmt
            git pull origin main
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -af --volumes
