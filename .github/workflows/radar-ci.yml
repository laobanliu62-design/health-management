name: 雷达服务 CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'hiclaw-services/company-search/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          cd hiclaw-services/company-search
          pip install -r requirements.txt
      
      - name: 语法检查
        run: |
          cd hiclaw-services/company-search
          python3 -m py_compile main.py
          echo "✅ 语法检查通过"
      
      - name: 启动服务测试
        run: |
          cd hiclaw-services/company-search
          python3 main.py &
          sleep 3
          curl -s http://localhost:8091/health | grep -q "ok" && echo "✅ 服务启动正常" || echo "❌ 服务启动失败"
          kill %1 2>/dev/null

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install ruff
      - run: ruff check hiclaw-services/company-search/ --ignore=E501 || true