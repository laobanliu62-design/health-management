name: Docker Build and Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: health-mgmt

jobs:
  # ========================================
  # Job 1: 代码检查和测试
  # ========================================
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.4
      
      - name: Install dependencies
        run: |
          cd health-management
          dart pub get
      
      - name: Static analysis
        run: |
          cd health-management
          dart analyze
      
      - name: Run tests
        run: |
          cd health-management
          dart test
        if: hashFiles('health-management/test/**') != ''

  # ========================================
  # Job 2: 构建和推送 Docker 镜像
  # ========================================
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./health-management/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ========================================
  # Job 3: 更新 Helm Chart
  # ========================================
  update-helm:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Helm
        uses: azure/setup-helm@v3
      
      - name: Configure git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
      
      - name: Update Helm values with new image tag
        run: |
          cd health-management/helm/health-mgmt
          
          # Get the latest image tag from CI
          LATEST_TAG=${{ github.sha }}
          
          # Update values.yaml
          sed -i "s/tag: latest/tag: $LATEST_TAG/" values.yaml
          
          # Commit and push
          git add values.yaml
          git commit -m "Update Helm values to $LATEST_TAG [skip ci]" || echo "No changes to commit"
          git push

  # ========================================
  # Job 4: 通知部署
  # ========================================
  notify:
    needs: [build-and-push, update-helm]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send deployment notification
        run: |
          echo "Docker image built and pushed successfully!"
          echo "Image: docker.io/health-mgmt:${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
