# 🐳 K8s Deployment - 健康管理系统

apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-mgmt
  namespace: health-app
  labels:
    app: health-mgmt
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: health-mgmt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: health-mgmt
        version: v1
    spec:
      containers:
      - name: health-mgmt
        image: health-mgmt:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        env:
        - name: NODE_ENV
          value: "production"
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config-volume
        configMap:
          name: health-mgmt-config
---
apiVersion: v1
kind: Service
metadata:
  name: health-mgmt-service
  namespace: health-app
spec:
  selector:
    app: health-mgmt
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: health-mgmt-config
  namespace: health-app
data:
  nginx.conf: |
    server {
      listen 80;
      server_name localhost;
      root /usr/share/nginx/html;
      index index.html;
      
      location / {
        try_files $uri $uri/ /index.html;
      }
      
      gzip on;
      gzip_types text/plain application/json text/css application/javascript;
    }
